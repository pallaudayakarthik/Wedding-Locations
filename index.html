<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Events</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #fff9f0 0%, #fef3e8 50%, #fdf0f5 100%);
    min-height: 100vh;
    padding: 2rem 1rem;
    color: #3a2a1a;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .header .flourish {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #8b4a6b;
    margin-bottom: 0.3rem;
  }
  .header .subtitle {
    font-size: 0.95rem;
    color: #b07a55;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .divider {
    text-align: center;
    color: #d4a0b0;
    font-size: 1.2rem;
    letter-spacing: 0.5rem;
    margin: 1rem 0 2rem;
  }
  .event-card {
    background: rgba(255,255,255,0.85);
    border-radius: 16px;
    border: 1px solid rgba(212, 160, 176, 0.3);
    padding: 1.5rem 1.5rem 1.25rem;
    margin-bottom: 1.25rem;
    backdrop-filter: blur(8px);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .event-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(139, 74, 107, 0.12);
  }
  .event-icon {
    font-size: 2rem;
    margin-bottom: 0.6rem;
    display: block;
  }
  .event-name {
    font-size: 1.35rem;
    font-weight: 400;
    color: #6b3050;
    letter-spacing: 0.03em;
    margin-bottom: 0.3rem;
  }
  .event-label {
    font-size: 0.8rem;
    color: #b07a55;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .event-label::before {
    content: '📍';
    font-size: 0.85rem;
  }
  .directions-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 0.75rem 1rem;
    background: linear-gradient(135deg, #8b4a6b, #a0556e);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-family: 'Georgia', serif;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    transition: opacity 0.2s ease, transform 0.15s ease;
  }
  .directions-btn:hover {
    opacity: 0.9;
    transform: scale(1.02);
  }
  .directions-btn:active {
    transform: scale(0.98);
  }
  .directions-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
    flex-shrink: 0;
  }
  .footer {
    text-align: center;
    margin-top: 2.5rem;
    padding-bottom: 1rem;
  }
  .footer .hearts {
    font-size: 1.4rem;
    letter-spacing: 0.4rem;
    color: #c4788a;
    display: block;
    margin-bottom: 0.5rem;
  }
  .footer p {
    font-size: 0.8rem;
    color: #c4a882;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="flourish">✦</div>
    <h1>Wedding Celebrations</h1>
    <div class="subtitle">We can't wait to celebrate with you</div>
  </div>
  <div class="divider">· · ✦ · ·</div>

  <div class="event-card">
    <span class="event-icon">🌼</span>
    <div class="event-name">Haldi</div>
    <div class="event-label">Tap below for directions</div>
    <a class="directions-btn" href="https://maps.app.goo.gl/1UgNH4stachkyje36" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Get Directions
    </a>
  </div>

  <div class="event-card">
    <span class="event-icon">💍</span>
    <div class="event-name">Engagement &amp; Sangeeth</div>
    <div class="event-label">Tap below for directions</div>
    <a class="directions-btn" href="https://maps.app.goo.gl/jU16E2Hxn2mwueVf9" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Get Directions
    </a>
  </div>

  <div class="event-card">
    <span class="event-icon">🔔</span>
    <div class="event-name">Muhurtham</div>
    <div class="event-label">Tap below for directions</div>
    <a class="directions-btn" href="https://maps.app.goo.gl/BnVLwgLRsNexQoig9" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Get Directions
    </a>
  </div>

  <div class="footer">
    <span class="hearts">♡ ♡ ♡</span>
    <p>With love &amp; joy</p>
  </div>
</div>
</body>
</html>
